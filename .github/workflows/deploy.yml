name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/varvara-hromushina/docker-crud-app

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kubsu
          POSTGRES_PASSWORD: kubsu
          POSTGRES_DB: kubsu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://kubsu:kubsu@localhost:5432/kubsu
          PYTHONPATH: .
        run: |
          pytest tests/ -v
      
      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .
      
      - name: Push image to GHCR
        run: docker push $IMAGE_NAME:latest

  deploy:
    needs: build-test-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Pull latest image
        run: podman pull ${{ env.IMAGE_NAME }}:latest
      
      - name: Stop old container
        run: |
          podman stop myapp || true
          podman rm myapp || true
      
      - name: Run new container
        run: |
          podman run -d \
            --name myapp \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@localhost:5432/kubsu \
            ${{ env.IMAGE_NAME }}:latest
      
      - name: Check health
        run: |
          sleep 5
          curl http://localhost:8041/health
